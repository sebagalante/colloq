version: "3.8"

services:
  postgres:
    image: paradedb/paradedb:latest
    container_name: colloq-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: colloq
      POSTGRES_PASSWORD: colloq
      POSTGRES_DB: colloq_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colloq -d colloq_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
